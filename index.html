<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Ecosystem Explorer</title>
    <style>
        :root {
            --base-blue: #0052ff;
            --base-dark: #0a0b0d;
            --text-light: #f0f0f0;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--base-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--base-blue);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 82, 255, 0.2);
            max-width: 500px;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: var(--base-blue);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        h1 { margin-bottom: 0.5rem; }
        p { color: #888; line-height: 1.6; }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }
        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 12px;
        }
        .badge {
            display: inline-block;
            background: var(--base-blue);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">BASE</div>
    <h1>gupenok on Base</h1>
    <p>Exploring the Ethereum L2 incubated by Coinbase. Building for the next billion users on-chain.</p>
    
    <div class="stats">
        <div class="stat-item">
            <strong>Security</strong>
            <div class="badge">Optimism Stack</div>
        </div>
        <div class="stat-item">
            <strong>Scalability</strong>
            <div class="badge">Low Gas Fees</div>
        </div>
    </div>

    <div style="margin-top: 2rem; font-size: 0.9rem; color: var(--base-blue);">
        Status: Verified Base Contributor
    </div>
</div>

</body>
</html>
